<body>

<div class="center">
  <h1>❤️ Mommy ❤️</h1>

  <p>l felt like shit when you said if l could make one then l said "labda unilipe"</p>

  <p>because when it comes to you there is nothing l wouldnt do.</p>

  <p>So l made this for you my love 💖</p>

  <a href="page2.html">
    <button>Open</button>

</div>

<script>
const emojis = ["❤️","💖","💘","💍","💕"];

function drop() {
  const e = document.createElement("div");
  e.classList.add("emoji");

  e.innerText = emojis[Math.floor(Math.random() * emojis.length)];

  e.style.left = Math.random() * 100 + "vw";
  e.style.animationDuration = (Math.random() * 3 + 2) + "s";
  e.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(e);

  setTimeout(() => e.remove(), 5000);
}

setInterval(drop, 200);
</script>

</body>
</html>
